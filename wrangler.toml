name = "chateame-web"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Custom domains del Worker (CF crea el DNS + rutea). Requiere token con
# Zone:Workers Routes + DNS sobre minibox.ar.
routes = [
  { pattern = "minibox.ar", custom_domain = true },
  { pattern = "www.minibox.ar", custom_domain = true },
]

[vars]
# NEXT_PUBLIC_API_URL must be set in the Cloudflare Pages project environment variables.
# Production value: https://api.minibox.ar
NEXT_PUBLIC_API_URL = "https://api.minibox.ar"

# Waitlist de beta cerrada: el endpoint /api/waitlist guarda los emails acá.
# Crear con: wrangler d1 create minibox-waitlist  → pegar el database_id.
[[d1_databases]]
binding = "WAITLIST_DB"
database_name = "minibox-waitlist"
database_id = "dfcf6796-d9dc-4cad-935d-f8480cbcff32"
